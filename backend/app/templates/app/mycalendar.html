{% extends 'app/base.html' %} {% block content %}

<div class="container mt-4">
  <div class="row">



    <!-- 右側：フォーム -->
    <div class="col-md-6 offset-md-3" style="margin-top: 36px">
      <h2>新規スケジュール作成</h2>
      <form action="" method="POST">
        {{ form.non_field_errors }} {% for field in form %}
        <div class="form-group row {% if field.errors %}field-error{% endif %}">
          <label for="{{ field.id_for_label }}" class="col-sm-4 col-form-label">
            {{ field.label_tag }}
          </label>
          <div class="col-sm-8">{{ field }} {{ field.errors }}</div>
        </div>
        {% endfor %} {% csrf_token %}
        <div class="d-flex">
          <button
            type="button"
            id="all-day-btn"
            class="btn btn-info ml-auto mr-3"
          >
            終日
          </button>
        </div>
        <br />
        

        <button type="submit" class="btn btn-primary btn-block">送信</button>
        <br>
        <a href="{% url 'app:month_with_schedule' month_current.year month_current.month %}"
          class="btn btn-secondary"
          id="move-to-month"
        >
          戻る
      </a>

      </form>
    </div>
  </div>
</div>


{% endblock %} {% block extrajs %}
<style>
  .field-error input,
  .field-error select,
  .field-error textarea {
    border-color: red;
  }

  .field-error .errorlist {
    color: red;
    margin-top: 0.25rem;
    font-size: 0.875rem;
  }
</style>
<link
  rel="stylesheet"
  type="text/css"
  href="https://cdnjs.cloudflare.com/ajax/libs/timedropper/1.0/timedropper.min.css"
/>


<script>
  $(function () {
    // 終日ボタンの動作
    $("#all-day-btn").on("click", function () {
      
      const targetDate = "{{ target_date | date:'Y-m-d' }}"; // ターゲットの日付を取得

      const startDateTime = targetDate + "T00:00";
      const endDateTime = targetDate + "T23:59";

      $("#id_start_datetime").val(startDateTime); // 開始時間を設定
      $("#id_end_datetime").val(endDateTime); // 終了時間を設定
    });

    $("#move-to-month").on("click", function(e){
      const result = confirm("内容を更新せずに月間カレンダーに戻りますか？");
      if (!result){
        e.preventDefault()
      }
    });
  });
</script>


{% endblock %}
